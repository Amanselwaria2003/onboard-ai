services:
  - type: web
    name: onboardai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FRONTEND_URL
        value: https://your-app.netlify.app
    disk:
      name: onboard-db
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
